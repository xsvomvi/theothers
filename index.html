<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Others</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- LOGO -->
    <div class="logo-container">
        <video id="logoVideo" autoplay muted loop playsinline>
            <source src="videos/logo.mov">
        </video>
    </div>

    <!-- START SCREEN -->
    <div id="startScreen">
        <p id="startText">SCAN FINGERPRINT TO START</p>

        <img
            src="images/fingerprint.png"
            alt="Start Experience"
            id="fingerprint"
        >
    </div>

    <!-- EXPERIENCE -->
    <div id="experience">

        <div class="video-wrapper">
            <video id="mainVideo" playsinline></video>
            <button id="continueBtn">continue</button>
        </div>

    </div>

    <!-- OVERLAYS (MUST BE OUTSIDE EXPERIENCE) -->
    <div id="observerOverlay"></div>

    <div id="gameScreen">

        <video id="webcamVideo" autoplay playsinline></video>

        <div id="dodgeBox">
            <img src="images/observers.png" id="boxLogo">
        </div>

        <canvas id="snapshotCanvas"></canvas>

    </div>

    <script src="script.js"></script>

</body>
</html>
