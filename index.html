<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Others</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGO -->
<div class="logo-container">
    <video id="logoVideo" autoplay muted loop playsinline>
        <source src="videos/logo.mov">
    </video>
</div>

<!-- START -->
<div id="startScreen">
    <p id="startText">scan fingerprint to start</p>
    <img src="images/fingerprint.png" id="fingerprint">
</div>

<!-- EXPERIENCE -->
<div id="experience">

    <div class="video-wrapper">
        <video id="mainVideo" playsinline></video>
        <button id="continueBtn">continue</button>
    </div>

</div>

<!-- OVERLAY -->
<div id="observerOverlay"></div>

<!-- GAME -->
<div id="gameScreen">
    <audio id="heartbeatSound" src="sounds/heartbeat.mp3" loop></audio>
    <audio id="shutterSound" src="sounds/shutter.mp3"></audio>

    <div id="timer">7</div>

    <div id="preGameOverlay">
        <div id="preGameText">stand in the tape area.</div>
        <div id="preGameTimer">7</div>
    </div>

    <video id="webcamVideo" autoplay playsinline></video>

    <div id="dodgeBox">
        <img src="images/observers.png" id="boxLogo">
    </div>

    <div id="flash"></div>

    <canvas id="snapshotCanvas"></canvas>

</div>

<div id="tutorialScreen">
    
    <img src="images/tutorial.png" id="tutorialImage">

    <button id="readyBtn">i'm ready</button>

</div>

<div id="shutdownScreen" class="hidden">

    <img src="images/shutdown.png" id="shutdownImage">

    <button id="readMessageBtn">read message</button>

</div>

<script src="script.js"></script>

</body>
</html>
